<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级五度圈 - 和弦连接图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: "Microsoft YaHei", "SimHei", "Segoe UI", sans-serif;
            overflow: hidden;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        #header {
            padding: 15px 30px;
            background: linear-gradient(90deg, #1a1a2e 0%, #16213e 100%);
            border-bottom: 1px solid #333;
        }
        
        h1 {
            font-size: 24px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        #canvas-container {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #circle-canvas {
            max-width: 100%;
            max-height: 100%;
        }
        
        #legend {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            font-size: 12px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }
        
        .legend-color {
            width: 20px;
            height: 3px;
            margin-right: 10px;
        }
        
        #info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            min-width: 250px;
            display: none;
        }
        
        #info-panel h3 {
            color: #00d4ff;
            margin-bottom: 10px;
        }
        
        #info-panel p {
            color: #aaa;
            font-size: 13px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="header">
            <h1>高级五度圈 - 和弦连接图谱</h1>
        </div>
        <div id="canvas-container">
            <canvas id="circle-canvas"></canvas>
            <div id="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #ff4444;"></div>
                    <span>属功能 (Dominant)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #44ff44;"></div>
                    <span>主功能 (Tonic)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #4444ff;"></div>
                    <span>下属功能 (Subdominant)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ffaa00;"></div>
                    <span>重属/副属 (Secondary)</span>
                </div>
            </div>
            <div id="info-panel">
                <h3 id="chord-name">和弦名称</h3>
                <p id="chord-info">和弦信息</p>
            </div>
        </div>
    </div>
    <script src="circle-of-fifths.js"></script>
</body>
</html>
